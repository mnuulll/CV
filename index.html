<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohammad Rizky Imanulhaq - Personal Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading-font { font-family: 'Playfair Display', sans-serif; }
    
    .hero-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
    }

    .nav-link {
      position: relative;
      transition: all 0.3s ease;
    }
    
    .nav-link:after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: linear-gradient(to right, #22d3ee, #a855f7);
      transition: width 0.3s ease;
    }
    
    .nav-link.active:after,
    .nav-link:hover:after {
      width: 100%;
    }

    .page-section {
      display: none;
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .page-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mobile-menu {
      transform: translateY(-100%);
      transition: transform 0.4s ease;
    }
    
    .mobile-menu.active {
      transform: translateY(0);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200">

  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-950/90 backdrop-blur-lg border-b border-slate-800">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="text-2xl font-bold heading-font tracking-tight">
        Rizky<span class="text-cyan-400">.</span>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden md:flex gap-8 text-sm font-medium">
        <button onclick="showPage('home')" id="nav-home" class="nav-link active">Home</button>
        <button onclick="showPage('education')" id="nav-education" class="nav-link">Pendidikan</button>
        <button onclick="showPage('experience')" id="nav-experience" class="nav-link">Pengalaman</button>
        <button onclick="showPage('projects')" id="nav-projects" class="nav-link">Proyek</button>
        <button onclick="showPage('contact')" id="nav-contact" class="nav-link">Kontak</button>
      </div>

      <div class="flex items-center gap-3">
        <a href="#" class="hidden sm:flex px-5 py-2.5 bg-white text-slate-900 rounded-full font-semibold text-sm hover:bg-cyan-400 transition-all items-center gap-2">
          <i class="fas fa-download"></i> CV
        </a>
        
        <!-- Hamburger -->
        <button id="hamburger" class="md:hidden text-2xl">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="mobile-menu hidden md:hidden bg-slate-950 border-t border-slate-800 py-6">
      <div class="flex flex-col gap-6 px-6 text-lg font-medium">
        <button onclick="showPage('home'); closeMobileMenu()" class="text-left">Home</button>
        <button onclick="showPage('education'); closeMobileMenu()" class="text-left">Pendidikan</button>
        <button onclick="showPage('experience'); closeMobileMenu()" class="text-left">Pengalaman</button>
        <button onclick="showPage('projects'); closeMobileMenu()" class="text-left">Proyek</button>
        <button onclick="showPage('contact'); closeMobileMenu()" class="text-left">Kontak</button>
        <a href="#" class="mt-4 inline-flex justify-center items-center gap-2 bg-gradient-to-r from-cyan-500 to-purple-600 py-3 rounded-2xl font-semibold">
          <i class="fas fa-download"></i> Unduh CV
        </a>
      </div>
    </div>
  </nav>

  <main class="pt-20">
    
    <!-- HERO -->
    <section id="home" class="page-section active hero-bg min-h-screen flex items-center">
      <div class="max-w-6xl mx-auto px-6 py-16 md:py-24">
        <div class="grid md:grid-cols-2 gap-12 items-center">
          <div class="space-y-8">
            <div class="inline-flex items-center gap-2 bg-slate-800/70 text-cyan-400 text-sm px-5 py-2 rounded-full border border-slate-700">
              <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
              Tersedia untuk Freelance / Kerja
            </div>

            <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold heading-font leading-tight">
              Halo, saya <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500">Rizky</span>
            </h1>

            <p id="typing" class="text-2xl md:text-3xl text-cyan-400 font-medium h-10"></p>

            <p class="text-lg text-slate-400 max-w-md">
              Web Developer &amp; UI/UX Enthusiast.<br>
              Saya suka membuat pengalaman digital yang indah dan fungsional.
            </p>

            <div class="flex flex-wrap gap-4">
              <button onclick="showPage('contact')" 
                      class="px-8 py-4 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-2xl font-semibold hover:scale-105 active:scale-95 transition-all">
                Hubungi Saya
              </button>
              <button onclick="showPage('projects')" 
                      class="px-8 py-4 border border-slate-600 hover:border-slate-400 rounded-2xl font-semibold hover:bg-slate-900 transition-all">
                Lihat Proyek
              </button>
            </div>
          </div>

          <!-- Image -->
          <div class="relative flex justify-center">
            <div class="w-80 h-80 md:w-96 md:h-96 relative">
              <div class="absolute inset-0 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-[4rem] rotate-6 scale-105 blur-2xl opacity-30"></div>
              <img src="https://via.placeholder.com/600x600/1e2937/64748b?text=Rizky" 
                   alt="Rizky" 
                   class="w-full h-full object-cover rounded-[3rem] shadow-2xl border-8 border-slate-900 relative z-10">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Other sections (Pendidikan, Pengalaman, dll) tetap sama seperti kode kamu, tinggal copy saja -->
    <!-- Saya sarankan kamu copy section-section lain dari kode lama kamu -->

  </main>

  <footer class="bg-black py-10 text-center text-slate-500 text-sm">
    © 2026 Mohammad Rizky Imanulhaq. Dibuat dengan ❤️
  </footer>

  <script>
    // Mobile Menu
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');

    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('active');
      mobileMenu.classList.toggle('hidden');
    });

    function closeMobileMenu() {
      mobileMenu.classList.add('hidden');
      mobileMenu.classList.remove('active');
    }

    // SPA Navigation
    function showPage(pageId) {
      document.querySelectorAll('.page-section').forEach(section => {
        section.classList.remove('active');
      });
      document.getElementById(pageId).classList.add('active');

      // Update active nav (desktop)
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
      });
      const activeNav = document.getElementById('nav-' + pageId);
      if (activeNav) activeNav.classList.add('active');

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Typing Effect
    const texts = ["Web Developer", "UI/UX Designer", "Frontend Enthusiast"];
    let count = 0, index = 0, currentText = '', letter = '';
    const typingElement = document.getElementById('typing');

    function type() {
      if (count === texts.length) count = 0;
      currentText = texts[count];
      letter = currentText.slice(0, ++index);
      typingElement.textContent = letter;

      if (letter.length === currentText.length) {
        count++;
        index = 0;
        setTimeout(type, 1800);
      } else {
        setTimeout(type, 70);
      }
    }

    setTimeout(type, 800);
  </script>
</body>
</html>
